<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <title>Calculadora | The Odin Project</title>
</head>

<body>

    <div class="cuerpoCalculadora">
        <div class="pantalla"></div>
        <button class="boton boton0" value="0">0</button>
        <button class="boton boton1" value="1">1</button>
        <button class="boton boton2" value="2">2</button>
        <button class="boton boton3" value="3">3</button>
        <button class="boton boton4" value="4">4</button>
        <button class="boton boton5" value="5">5</button>
        <button class="boton boton6" value="6">6</button>
        <button class="boton boton7" value="7">7</button>
        <button class="boton boton8" value="8">8</button>
        <button class="boton boton9" value="9">9</button>
        <button class="boton botonSuma" value="+">+</button>
        <button class="boton botonResta" value="-">-</button>
        <button class="boton botonDividir" value="/">/</button>
        <button class="boton botonMultiplicar" value="*">x</button>
        <button class="boton botonPar1" value="(">(</button>
        <button class="boton botonPar2" value=")">)</button>
        <button class="boton botonPunto" value=".">.</button>
        <button class="boton botonEnter" value="=">Enter</button>
        <button class="boton botonBorrar" value="clear">C</button>
    </div>


    <script src="./js/script.js"></script>
</body>

</html>
