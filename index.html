<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <title>Calculadora | The Odin Project</title>
</head>

<body>

    <div class="cuerpoCalculadora">
        <div class="pantalla"></div>
        <button class="boton boton0">0</button>
        <button class="boton boton1">1</button>
        <button class="boton boton2">2</button>
        <button class="boton boton3">3</button>
        <button class="boton boton4">4</button>
        <button class="boton boton5">5</button>
        <button class="boton boton6">6</button>
        <button class="boton boton7">7</button>
        <button class="boton boton8">8</button>
        <button class="boton boton9">9</button>
        <button class="boton botonSuma">+</button>
        <button class="boton botonResta">-</button>
        <button class="boton botonDividir">/</button>
        <button class="boton botonMultiplicar">X</button>
        <button class="boton botonPar1">(</button>
        <button class="boton botonPar2">)</button>
        <button class="boton botonPunto">.</button>
        <button class="boton botonEnter">Enter</button>
        <button class="boton botonBorrar">C</button>
    </div>


    <script src="./js/script.js"></script>
</body>

</html>
